name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_REV: 764d5a3199fa2999ae979255e467c9d96fd65780
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang lld mold
      - name: Setup uv
        uses: astral-sh/setup-uv@c5680ec91f7b9b91406fab4ded5d45245abf7b67
      - name: Check spelling
        run: make spelling
      - name: Install template test tools
        run: |
          set -euo pipefail
          cargo binstall --no-confirm --locked cargo-nextest
          uv tool install mbake
      - name: Cache Whitaker installation
        id: cache-whitaker
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.local/bin/whitaker
            ~/.dylint_drivers
            ~/.local/share/whitaker
          key: whitaker-v2-${{ runner.os }}-${{ env.WHITAKER_INSTALLER_REV }}
      - name: Install Whitaker
        run: |
          set -euo pipefail
          echo "Whitaker cache hit: ${{ steps.cache-whitaker.outputs.cache-hit }}"
          if [ "${{ steps.cache-whitaker.outputs.cache-hit }}" != "true" ]; then
            echo "Installing Whitaker installer at ${WHITAKER_INSTALLER_REV}"
            cargo install --locked \
              --git https://github.com/leynos/whitaker \
              --rev "${WHITAKER_INSTALLER_REV}" \
              whitaker-installer
          fi
          whitaker-installer --cranelift
          echo "Whitaker binary: $(command -v whitaker || true)"
      - name: Test
        run: make test
