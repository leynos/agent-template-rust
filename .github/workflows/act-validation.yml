name: Act Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  act-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACT_VERSION: v0.2.80
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_REV: f768c2e53c47df13658af1168a67851d388750bf
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@d28e04c9ea359650a85d697d1ab3d0be0b5674e7
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang lld mold
      - name: Setup uv
        uses: astral-sh/setup-uv@c5680ec91f7b9b91406fab4ded5d45245abf7b67
      - name: Install template test tools
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/nektos/act/releases/download/${ACT_VERSION}/act_Linux_x86_64.tar.gz" |
            sudo tar -xz -C /usr/local/bin act
          cargo binstall --no-confirm cargo-nextest
          uv tool install mbake
      - name: Check Docker runtime
        run: docker info
      - name: Cache Whitaker installation
        id: cache-whitaker
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.local/bin/whitaker
            ~/.dylint_drivers
            ~/.local/share/whitaker
          key: whitaker-v2-${{ runner.os }}-${{ env.WHITAKER_INSTALLER_REV }}
      - name: Install Whitaker
        run: |
          set -euo pipefail
          echo "Whitaker cache hit: ${{ steps.cache-whitaker.outputs.cache-hit }}"
          if [ "${{ steps.cache-whitaker.outputs.cache-hit }}" != "true" ]; then
            echo "Installing Whitaker installer at ${WHITAKER_INSTALLER_REV}"
            cargo install --locked \
              --git https://github.com/leynos/whitaker \
              --rev "${WHITAKER_INSTALLER_REV}" \
              whitaker-installer
          fi
          whitaker-installer --cranelift
          echo "Whitaker binary: $(command -v whitaker || true)"
      - name: Test with act validation
        run: make test WITH_ACT=1
